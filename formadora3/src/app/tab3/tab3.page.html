<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Todos os Produtos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div style="padding: 16px;">
    <ion-button expand="block" (click)="carregarProdutos()" *ngIf="!mostrarLista">
      Mostrar Todos os Produtos
    </ion-button>

    <ion-button expand="block" color="danger" (click)="esconderLista()" *ngIf="mostrarLista">
      Esconder Lista
    </ion-button>
  </div>

  <div *ngIf="mostrarLista">
    <ion-card *ngFor="let p of produtos">
      <img [src]="p.image" [alt]="p.title" style="height: 200px; object-fit: contain; padding: 10px;"/>
      <ion-card-header>
        <ion-card-title>{{ p.title }}</ion-card-title>
        <ion-card-subtitle>{{ p.category }}</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <p>{{ p.description }}</p>
        <p><strong>R$ {{ p.price }}</strong></p>
        <p>ID: {{ p.id }}</p>
      </ion-card-content>
    </ion-card>
  </div>

</ion-content>
