<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Produtos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div *ngIf="produto">
    <ion-card>
      <img [src]="produto.image" [alt]="produto.title"/>
      <ion-card-header>
        <ion-card-title>{{ produto.title }}</ion-card-title>
        <ion-card-subtitle>{{ produto.category }}</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <p>{{ produto.description }}</p>
        <p><strong>R$ {{ produto.price }}</strong></p>
        <p>ID: {{ produto.id }}</p>
      </ion-card-content>
    </ion-card>

    <ion-grid>
      <ion-row>
        <ion-col>
          <ion-button expand="block" (click)="anterior()" [disabled]="indice === 0">
            ◀ Anterior
          </ion-button>
        </ion-col>
        <ion-col>
          <ion-button expand="block" (click)="proximo()" [disabled]="indice === produtos.length - 1">
            Próximo ▶
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
